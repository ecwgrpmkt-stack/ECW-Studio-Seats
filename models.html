<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ECW Showroom</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://raw.githubusercontent.com">
    <link rel="preconnect" href="https://api.github.com">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="showroom-mode">
        
        <div id="fadeOverlay" class="active"></div>

        <div class="top-ui-bar">
            <a href="#" id="shellBackBtn" class="back-btn">
    <span class="arrow">←</span> BACK
</a>
            
        </div>

        <div id="model-container">
            <model-viewer 
                id="viewer3d" 
                camera-controls 
                auto-rotate 
                interpolation-decay="200" 
                shadow-intensity="1" 
                shadow-softness="0.6"
                exposure="1.0"
                min-camera-orbit="auto 0deg auto" 
                max-camera-orbit="auto 85deg auto"
                min-field-of-view="10deg"
                max-field-of-view="45deg"
                interaction-prompt="none"
                loading="eager"
                crossorigin="anonymous"
                src="" 
                alt="3D Vehicle Model">
                <div class="poster-loader" slot="poster"></div>
            </model-viewer>
        </div>

        <div id="colorEditorDock" class="color-editor-dock hidden">
            <div class="dock-header">
                <h3>SEAT FINISH</h3>
            </div>
            
            <div class="rgb-picker-module">
                <div class="module-title-row">
                    <span class="module-label">SEAT COLOR 1</span>
                    <button class="reset-btn" id="resetSeat1Btn" title="Reset Seat Color 1">↺</button>
                </div>
                <label class="picker-wrapper" for="seat1ColorPicker">
                    <input type="color" id="seat1ColorPicker" value="#ffffff" disabled>
                    <span id="seat1HexDisplay" class="hex-display">#FFFFFF</span>
                </label>
            </div>

            <div class="rgb-picker-module">
                <div class="module-title-row">
                    <span class="module-label">SEAT COLOR 2</span>
                    <button class="reset-btn" id="resetSeat2Btn" title="Reset Seat Color 2">↺</button>
                </div>
                <label class="picker-wrapper" for="seat2ColorPicker">
                    <input type="color" id="seat2ColorPicker" value="#000000" disabled>
                    <span id="seat2HexDisplay" class="hex-display">#000000</span>
                </label>
            </div>

            <div class="rgb-picker-module">
                <div class="module-title-row">
                    <span class="module-label">STITCH COLOR</span>
                    <button class="reset-btn" id="resetStitchBtn" title="Reset Stitch Color">↺</button>
                </div>
                <label class="picker-wrapper" for="stitchColorPicker">
                    <input type="color" id="stitchColorPicker" value="#000000" disabled>
                    <span id="stitchHexDisplay" class="hex-display">#000000</span>
                </label>
            </div>

            <div class="sliders-container">
                <div class="slider-module">
                    <div class="module-title-row">
                        <span class="module-label">BRIGHTNESS</span>
                        <button class="reset-btn" id="resetBrightnessBtn" title="Reset Brightness">↺</button>
                    </div>
                    <input type="range" id="brightnessSlider" min="0.2" max="2.0" step="0.1" value="1.0">
                </div>
            </div>
        </div>
        <div id="bottomDock">
            <div class="fs-wrapper">
                <button id="fsBtn" title="Fullscreen">⛶</button>
            </div>
            
            <div class="thumbnail-bar">
                <div id="variantPanel" class="variant-btn-area"></div>
            </div>
        </div>
        
        <div id="idleIndicator">
            <div class="hand-icon">👆</div>
            <div class="drag-text">Drag to Explore</div>
        </div>

        <div id="ecwLoader">
            <div class="spinner"></div>
            <div class="loader-text">ECW</div>
        </div>

    </div>
    
    <script src="color-engine.js"></script>
    <script src="models.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Send "Close Iframe" command to the Master Landing Page
            const shellBackBtn = document.getElementById('shellBackBtn');
            if (shellBackBtn) {
                shellBackBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (window.self !== window.top) { // Check if running inside iframe
                        window.parent.postMessage('close-iframe', '*');
                    } else { // Fallback if opened directly
                        window.location.href = "https://ecwgrpmkt-stack.github.io/ECW-Studio-Landing-Page/index.html";
                    }
                });
            }

            // 2. Send "Toggle Fullscreen" command to the Master Landing Page
            const fsBtn = document.getElementById('fsBtn');
            if (fsBtn) {
                // Remove any old click listeners attached to this button in models.js
                const newFsBtn = fsBtn.cloneNode(true);
                fsBtn.parentNode.replaceChild(newFsBtn, fsBtn);
                
                newFsBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (window.self !== window.top) {
                        window.parent.postMessage('toggle-fullscreen', '*');
                    } else {
                        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                        else if (document.exitFullscreen) document.exitFullscreen();
                    }
                });
            }
        });
    </script>
</body>
</html>
</body>
</html>
